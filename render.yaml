services:
  - type: web
    name: deep-research-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py --http
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
